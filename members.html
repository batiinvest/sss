<!DOCTYPE html>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
<div class="layout">

  <nav class="sidebar">
    <a href="index.html" class="logo" style="text-decoration:none;color:inherit;cursor:pointer;">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="22" height="22" rx="6" fill="#185fa5"/>
        <text x="11" y="15.5" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">S</text>
        <polyline points="3,16 7,11 11,13 17,7" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
      </svg>
      SSS
    </a>
    <!-- 미니 프로필 카드 -->
    <div id="sideProfile" style="display:none;margin:8px 10px 4px;padding:10px 12px;background:var(--bg);border-radius:var(--r-md);border:0.5px solid var(--border);">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <div id="sideAvatar" class="avatar av1" style="width:30px;height:30px;font-size:11px;flex-shrink:0;">—</div>
        <div style="min-width:0;">
          <div id="sideName" style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">—</div>
          <a href="mypage.html" style="font-size:11px;color:var(--accent);text-decoration:none;">내 정보 →</a>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;">
        <div style="background:var(--surface);border-radius:4px;padding:5px 7px;">
          <div style="font-size:10px;color:var(--muted);">기준금액</div>
          <div id="sideBase" style="font-size:12px;font-weight:500;">—</div>
        </div>
        <div style="background:var(--surface);border-radius:4px;padding:5px 7px;">
          <div style="font-size:10px;color:var(--muted);">누적 수익률</div>
          <div id="sideReturn" style="font-size:12px;font-weight:500;">—</div>
        </div>
        <div style="background:var(--surface);border-radius:4px;padding:5px 7px;">
          <div style="font-size:10px;color:var(--muted);">투자금</div>
          <div id="sideInvested" style="font-size:12px;font-weight:500;">—</div>
        </div>
        <div style="background:var(--surface);border-radius:4px;padding:5px 7px;">
          <div style="font-size:10px;color:var(--muted);">잔액</div>
          <div id="sideCash" style="font-size:12px;font-weight:500;">—</div>
        </div>
      </div>
    </div>
    <a href="index.html" class="nav-item"><div class="nav-dot g"></div>대시보드</a>
    <a href="picks.html" class="nav-item"><div class="nav-dot"></div>탑픽 관리</a>
    <a href="trade.html" class="nav-item"><div class="nav-dot r"></div>매수 / 매도</a>
    <a href="members.html" class="nav-item active"><div class="nav-dot"></div>참여자 현황</a>
    <a href="settle.html" class="nav-item"><div class="nav-dot a"></div>결산 관리</a>
    <a href="schedule.html" class="nav-item"><div class="nav-dot g"></div>스터디 일정</a>
    <a href="presentations.html" class="nav-item"><div class="nav-dot g"></div>발표 히스토리</a>
    <a href="mypage.html" class="nav-item" id="nav-mypage"><div class="nav-dot"></div>내 정보</a>
    <a href="admin.html"  class="nav-item nav-admin-item" id="nav-admin"><div class="nav-dot"></div>사용자 관리</a>
    <div class="sidebar-spacer"></div>
    <div class="sidebar-footer">
      <button class="btn" style="width:100%;font-size:12px;" onclick="doLogout()">로그아웃</button>
    </div>
  </nav>

  <main class="main">

    <div class="topbar">
      <div>
        <div class="page-title">참여자 현황</div>
        <div class="updated">확정 결산 기준 누적 수익률</div>
      </div>
    </div>

    <!-- 참여자 카드 그리드 -->
    <div id="memberCards" style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:1.25rem;"></div>

    <!-- 개인별 히스토리 -->
    <div class="card">
      <div class="card-head">
        <div class="card-title">개인별 종목 히스토리</div>
        <select id="memberSelect" onchange="loadMemberHistory()" style="font-size:12px;padding:4px 8px;width:auto;">
          <option value="">참여자 선택</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>월</th><th>종목</th><th>매수가</th><th>매도가</th>
            <th>수익률</th><th>확정 손익</th><th>결산 후 기준금액</th><th>상태</th>
          </tr></thead>
          <tbody id="memberHistTbody">
            <tr><td colspan="8" class="muted" style="text-align:center;padding:1.5rem;">참여자를 선택하세요</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js?v=20260412"></script>
<script src="js/db.js?v=20260412"></script>
<script>
let members = [], allTrades = [];
let allPicks = [];
let settlements = [];

async function init() {
  await requireAuth();
  [members, allPicks, settlements, allTrades] = await Promise.all([
    fetchMemberStats(), fetchAllPicks(), fetchSettlements(), fetchAllTrades()
  ]);

  renderMemberCards();

  const sel = document.getElementById('memberSelect');
  members.forEach(m => sel.innerHTML += `<option value="${m.id}">${m.name}</option>`);
}

function renderMemberCards() {
  const totalInitial = members.length * (typeof BASE_AMOUNT !== "undefined" ? BASE_AMOUNT : 500000);
  const totalCurrent = members.reduce((s,m) => s + m.base_amount, 0);
  const totalProfit  = totalCurrent - totalInitial;

  document.getElementById('memberCards').innerHTML = members.map((m, i) => {
    const picks    = allPicks.filter(p => p.member_id === m.id);
    const mySettles = settlements.filter(s => s.member_id === m.id);
    // 개인별 투자금 / 잔액
    const myBuy     = allTrades.filter(t => t.member_id === m.id && t.trade_type === 'buy')
                       .reduce((s,t) => s + t.price * t.quantity, 0);
    const mySell    = allTrades.filter(t => t.member_id === m.id && t.trade_type === 'sell')
                       .reduce((s,t) => s + t.price * t.quantity, 0);
    const myInvested = myBuy - mySell;
    const myCash     = m.base_amount - myInvested;
    const bestPick = mySettles.reduce((best, s) =>
      (s.return_rate > (best?.return_rate || -Infinity) ? s : best), null);
    const totalTrades = picks.length;
    const winCount    = mySettles.filter(s => s.net_profit > 0).length;
    const winRate     = mySettles.length ? Math.round(winCount / mySettles.length * 100) : 0;

    const rCl = m.return_rate >= 0 ? 'up' : 'dn';
    const barW = Math.min(Math.abs(m.return_rate) * 4, 100);
    const barC = m.return_rate >= 0 ? 'bar-up' : 'bar-dn';

    return `<div class="card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
        <div class="avatar ${avCls[i%4]}" style="width:40px;height:40px;font-size:14px;">${m.name.slice(0,2)}</div>
        <div>
          <div style="font-size:15px;font-weight:500;">${m.name}</div>
          <div style="font-size:12px;color:var(--muted);">참여일 ${m.joined_at}</div>
        </div>
        <div style="margin-left:auto;text-align:right;">
          <div class="metric-value ${rCl}" style="font-size:20px;">${pct(m.return_rate)}</div>
          <div style="font-size:11px;color:var(--muted);">누적 수익률</div>
        </div>
      </div>
      <div style="height:5px;background:var(--bg);border-radius:4px;overflow:hidden;margin-bottom:14px;">
        <div class="prog-bar ${barC}" style="width:${barW}%;"></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
        <div style="background:var(--bg);border-radius:var(--r-md);padding:8px 10px;">
          <div style="font-size:11px;color:var(--muted);">기준금액</div>
          <div style="font-size:13px;font-weight:500;">${won(m.base_amount)}</div>
        </div>
        <div style="background:var(--bg);border-radius:var(--r-md);padding:8px 10px;">
          <div style="font-size:11px;color:var(--muted);">투자금</div>
          <div style="font-size:13px;font-weight:500;">${won(myInvested)}</div>
        </div>
        <div style="background:var(--bg);border-radius:var(--r-md);padding:8px 10px;">
          <div style="font-size:11px;color:var(--muted);">잔액</div>
          <div style="font-size:13px;font-weight:500;${myCash<0?'color:var(--up)':''}">${won(myCash)}</div>
        </div>
        <div style="background:var(--bg);border-radius:var(--r-md);padding:8px 10px;">
          <div style="font-size:11px;color:var(--muted);">승률</div>
          <div style="font-size:13px;font-weight:500;">${winRate}%</div>
        </div>
      </div>
      ${bestPick ? `<div style="margin-top:10px;font-size:12px;color:var(--muted);">최고 수익 종목: <strong>${bestPick.picks?.stock_name || '-'}</strong> <span class="up">+${bestPick.return_rate}%</span></div>` : ''}
    </div>`;
  }).join('');
}

async function loadMemberHistory() {
  const memberId = document.getElementById('memberSelect').value;
  if (!memberId) return;
  const picks = allPicks.filter(p => p.member_id === memberId);
  const tbody = document.getElementById('memberHistTbody');

  if (!picks.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="muted" style="text-align:center;padding:1.5rem;">데이터 없음</td></tr>';
    return;
  }

  let runningBase = (typeof BASE_AMOUNT !== "undefined" ? BASE_AMOUNT : 500000);
  tbody.innerHTML = picks.map(p => {
    const settle = settlements.find(s => s.pick_id === p.pick_id);
    const r = p.realized_return;
    if (settle) runningBase = settle.new_base_amount || runningBase + (settle.net_profit || 0);
    const statusBadge = p.status === 'sold'
      ? '<span class="badge b-sold">매도완료</span>'
      : '<span class="badge b-hold">보유중</span>';
    return `<tr>
      <td class="muted">${(p.month||'').replace('-','년 ')}월</td>
      <td style="font-weight:500;">${p.stock_name}</td>
      <td>${won(p.buy_price)}</td>
      <td>${won(p.sell_price)}</td>
      <td class="${rCls(r)}">${pct(r)}</td>
      <td class="${rCls(settle?.net_profit)}">${settle ? (settle.net_profit>=0?'+':'')+won(settle.net_profit) : '-'}</td>
      <td style="font-weight:500;">${settle ? won(runningBase) : '-'}</td>
      <td>${statusBadge}</td>
    </tr>`;
  }).join('');
}

async function doLogout() {
  await sb.auth.signOut();
  location.href = 'index.html';
}

init();
</script>
</body>
</html>
