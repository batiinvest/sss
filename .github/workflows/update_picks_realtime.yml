name: 탑픽 현재가 업데이트 (장중 자동)

on:
  schedule:
    - cron: '0 1 * * 1-5'    # KST 10:00 (UTC 01:00)
    - cron: '0 4 * * 1-5'    # KST 13:00 (UTC 04:00)
    - cron: '30 6 * * 1-5'   # KST 15:30 장 마감 직전 (UTC 06:30)
  workflow_dispatch:           # 수동 실행 / 대시보드 버튼

jobs:
  update-picks:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 패키지 설치
        run: pip install finance-datareader requests -q

      - name: 탑픽 종목 현재가 업데이트
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 - << 'PYEOF'
          import json, os, ssl, time, datetime
          import urllib.request
          import FinanceDataReader as fdr

          SUPABASE_URL = os.environ['SUPABASE_URL']
          SERVICE_KEY  = os.environ['SUPABASE_SERVICE_KEY']
          ctx = ssl.create_default_context()

          headers_read = {
            'apikey': SERVICE_KEY,
            'Authorization': 'Bearer ' + SERVICE_KEY,
          }
          headers_write = {
            **headers_read,
            'Content-Type': 'application/json',
            'Prefer': 'resolution=merge-duplicates',
          }

          def sb_get(path):
            req = urllib.request.Request(
              SUPABASE_URL + path, headers=headers_read
            )
            with urllib.request.urlopen(req, context=ctx, timeout=15) as r:
              return json.loads(r.read())

          def sb_upsert(rows):
            data = json.dumps(rows).encode()
            req = urllib.request.Request(
              SUPABASE_URL + '/rest/v1/stock_prices',
              data=data, headers=headers_write, method='POST'
            )
            with urllib.request.urlopen(req, context=ctx, timeout=15) as r:
              r.read()

          # 1. 현재 보유 중인 탑픽 종목 코드 조회 (status = hold)
          picks = sb_get(
            '/rest/v1/picks_with_trades'
            '?select=stock_code,stock_name,market'
            '&status=eq.hold'
            '&stock_code=not.is.null'
          )

          if not picks:
            print('보유 중인 탑픽 없음 — 종료')
            exit(0)

          # 중복 제거
          code_map = {}
          for p in picks:
            code = p.get('stock_code')
            if code:
              code_map[code] = p

          codes  = list(code_map.keys())
          print(f'탑픽 종목: {len(codes)}개 → {codes}')

          now_iso = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')

          # 2. KRX 전체 시세에서 해당 종목만 추출
          rows = []
          for market_name, df in [('KOSPI', fdr.StockListing('KOSPI')),
                                   ('KOSDAQ', fdr.StockListing('KOSDAQ'))]:
            for _, row in df.iterrows():
              code = str(row.get('Code', '')).strip().zfill(6)
              if code not in code_map:
                continue
              try:
                price = int(float(row.get('Close', 0) or 0))
              except:
                price = 0
              if price == 0:
                continue
              try:
                market_cap = int(float(row.get('Marcap', 0) or 0) // 100_000_000) or None
              except:
                market_cap = None
              try:
                change_rate = round(float(row.get('ChagesRatio', 0) or 0), 2)
              except:
                change_rate = 0.0

              rows.append({
                'stock_code':  code,
                'stock_name':  code_map[code].get('stock_name', ''),
                'market':      market_name,
                'price':       price,
                'change_rate': change_rate,
                'market_cap':  market_cap,
                'updated_at':  now_iso,
              })
              print(f'  {code} {code_map[code].get("stock_name")} → {price:,}원 ({change_rate:+.2f}%)')

          if not rows:
            print('업데이트할 가격 데이터 없음')
            exit(0)

          # 3. Supabase 업데이트
          sb_upsert(rows)
          print(f'✅ 탑픽 {len(rows)}개 업데이트 완료')
          PYEOF
