<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSS · 스터디 펀드</title>
  <link rel="stylesheet" href="css/style.css?v=20260424">
  <script>if(window!==window.parent){document.documentElement.classList.add("in-iframe");}</script>

</head>
<body>

<div class="layout layout-page"><main class="main">
    <div id="db-banner" class="db-banner pending">DB 연결 확인 중...</div>

    <div class="topbar">
      <div>
        <div class="page-title">탑픽 관리</div>
        <div class="updated">종목 제출 · 월별 히스토리 조회</div>
      </div>
      <button class="btn btn-primary" onclick="openPickForm()">+ 탑픽 제출</button>
    </div>

    <!-- 월별 탭 + 테이블 -->
    <div class="card mb-card">
      <div class="card-head">
        <div class="card-title">월별 탑픽</div>
        <div class="tab-row" id="monthTabs"></div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>추천자</th><th>종목</th><th>시장</th>
            <th>매수가</th><th>매도가</th><th>확정 수익률</th>
            <th>목표가</th><th>시총 상승여력</th><th>상태</th>
          </tr></thead>
          <tbody id="monthPicksTbody">
            <tr><td colspan="9" class="empty-cell">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 매수 사유 카드 -->
    <div class="card">
      <div class="card-head"><div class="card-title">매수 사유</div></div>
      <div id="reasonCards" class="grid-2" style="grid-template-columns:repeat(2,minmax(0,1fr));"></div>
    </div>

    <!-- 전체 히스토리 -->
    <div class="card" style="margin-top:1.25rem;">
      <div class="card-head">
        <div class="card-title">전체 히스토리</div>
        <div style="display:flex;gap:6px;align-items:center;">
          <select id="filterMember" onchange="applyFilter()" style="font-size:12px;padding:4px 8px;width:auto;">
            <option value="">전체 참여자</option>
          </select>
          <select id="filterStatus" onchange="applyFilter()" style="font-size:12px;padding:4px 8px;width:auto;">
            <option value="">전체 상태</option>
            <option value="hold">보유중</option>
            <option value="sold">매도완료</option>
          </select>
        </div>
      </div>
      <div class="table-wrap">
        <table style="table-layout:fixed;min-width:720px;">
          <thead><tr>
            <th style="width:64px;">월</th>
            <th style="width:70px;">추천자</th>
            <th style="width:110px;">종목</th>
            <th style="width:56px;">시장</th>
            <th style="width:90px;">매수가</th>
            <th style="width:90px;">매도가</th>
            <th style="width:80px;">수익률</th>
            <th style="width:70px;">상태</th>
            <th>매수 사유</th>
          </tr></thead>
          <tbody id="historyTbody">
            <tr><td colspan="9" class="empty-cell">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  
<!-- 탑픽 제출 팝업 -->
<div id="pickFormModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:600;align-items:flex-start;justify-content:center;overflow-y:auto;padding:2rem 1rem;">
  <div style="background:var(--surface);border-radius:var(--r-lg);padding:1.5rem;width:100%;max-width:520px;border:0.5px solid var(--border);margin:auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;">
      <div>
        <div style="font-size:15px;font-weight:500;">+ 탑픽 제출</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px;">내 탑픽 종목 제출</div>
      </div>
      <button class="btn" onclick="closePickForm()" style="font-size:12px;">닫기</button>
    </div>

    <!-- 대상 월 -->
    <div style="margin-bottom:1rem;">
      <label style="font-size:12px;color:var(--muted);font-weight:500;display:block;margin-bottom:4px;">대상 월 *</label>
      <input type="month" id="f-month" style="font-size:13px;padding:7px 10px;width:100%;" />
    </div>

    <!-- 종목 검색 -->
    <div style="margin-bottom:1rem;">
      <label style="font-size:12px;color:var(--muted);font-weight:500;display:block;margin-bottom:4px;">종목명 검색 * <span style="font-weight:400;color:var(--muted);">— 2글자 이상 입력</span></label>
      <div style="position:relative;">
        <input type="text" id="f-stock" placeholder="예: 삼성전자 또는 005930"
          autocomplete="off" oninput="onStockSearch(this.value)" onkeydown="onStockSearchKey(event)"
          style="width:100%;font-size:14px;padding:8px 12px;" />
        <div id="stockDropdown" class="autocomplete-dropdown"></div>
      </div>
    </div>

    <input type="hidden" id="f-code" />
    <input type="hidden" id="f-market" value="KOSPI" />
    <input type="hidden" id="f-db-price" />
    <input type="hidden" id="f-db-cap" />

    <!-- 선택 확인 -->
    <div id="selectedStock" class="upside-preview" style="display:none;margin-bottom:1rem;">
      <span id="selectedStockText"></span>
      <button onclick="clearSelectedStock()" style="background:none;border:none;cursor:pointer;color:var(--muted);margin-left:8px;font-size:12px;">✕ 다시 선택</button>
    </div>

    <!-- 현재가 조회 결과 -->
    <div id="lookupResult" style="display:none;margin-bottom:1rem;">
      <div class="price-result-grid">
        <div class="price-cell"><div class="price-cell-label">현재가</div><div class="price-cell-value" id="r-price">—</div></div>
        <div class="price-cell"><div class="price-cell-label">당일 등락</div><div class="price-cell-value" id="r-change">—</div></div>
        <div class="price-cell"><div class="price-cell-label">시가총액</div><div class="price-cell-value small" id="r-cap">—</div></div>
      </div>
    </div>

    <!-- 목표주가 / 시총 -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;">
      <div><label style="font-size:12px;color:var(--muted);font-weight:500;display:block;margin-bottom:4px;">현재가 (원)</label><input type="number" id="f-cur-price" placeholder="자동 입력됨" oninput="onCurPriceInput()" style="font-size:13px;padding:7px 10px;width:100%;"></div>
      <div><label style="font-size:12px;color:var(--muted);font-weight:500;display:block;margin-bottom:4px;">목표 주가 (원)</label><input type="number" id="f-target-price" placeholder="예: 90000" oninput="onTargetPriceInput()" style="font-size:13px;padding:7px 10px;width:100%;"></div>
    </div>
    <div id="upsidePreview" style="display:none;margin-bottom:8px;" class="upside-preview"><span id="upsideText"></span></div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;">
      <div><label style="font-size:12px;color:var(--muted);font-weight:500;display:block;margin-bottom:4px;">현재 시총 (억원)</label><input type="number" id="f-cur-cap" placeholder="자동 입력됨" oninput="calcCapUpside()" style="font-size:13px;padding:7px 10px;width:100%;"></div>
      <div><label style="font-size:12px;color:var(--muted);font-weight:500;display:block;margin-bottom:4px;">목표 시총 (억원)</label><input type="number" id="f-tgt-cap" placeholder="예: 4200000" oninput="onTargetCapInput()" style="font-size:13px;padding:7px 10px;width:100%;"></div>
    </div>
    <div id="capUpsidePreview" style="display:none;margin-bottom:8px;" class="upside-preview"><span id="capUpsideText"></span></div>

    <!-- 매수 사유 -->
    <div style="margin-bottom:1rem;">
      <label style="font-size:12px;color:var(--muted);font-weight:500;display:block;margin-bottom:4px;">매수 사유</label>
      <textarea id="f-reason" placeholder="매수 근거, 투자 thesis, 리스크 등" style="min-height:90px;font-size:13px;padding:7px 10px;width:100%;resize:vertical;border:0.5px solid var(--border2);border-radius:var(--r-md);font-family:inherit;"></textarea>
    </div>

    <div style="display:flex;justify-content:flex-end;gap:8px;">
      <button class="btn" onclick="closePickForm()">취소</button>
      <button class="btn btn-primary" id="submitBtn" onclick="submitPickForm()">제출</button>
    </div>
  </div>
</div>
</main>
</div>
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js?v=20260424"></script>
<script src="js/db.js?v=20260424"></script>
<script>
let allPicks = [];
let members  = [];
let selMonth = currentMonth();
let autoLookupTimer = null;

async function init() {
  await requireAuth();
  checkDBConnection();

  // 멤버·탑픽 병렬 로드
  [members, allPicks] = await Promise.all([
    fetchMembers(),
    fetchAllPicks(),
  ]);

  const flt = document.getElementById('filterMember');
  members.forEach(m => {
    flt.innerHTML += `<option value="${m.id}">${m.name}</option>`;
  });

  document.getElementById('f-month').value = selMonth;
  buildMonthTabs();
  renderMonthPicks(selMonth);
  renderHistory();
}

// ── 종목코드 입력 후 0.9초 대기 → 자동 조회
// ── 종목명 자동완성 검색
let stockSearchTimer = null;
let dropdownIdx = -1;

async function onStockSearch(val) {
  clearTimeout(stockSearchTimer);
  const q = val.trim();
  const dd = document.getElementById('stockDropdown');

  if (q.length < 2) {
    dd.style.display = 'none';
    return;
  }

  stockSearchTimer = setTimeout(async () => {
    try {
      const { data } = await sb.from('stock_prices')
        .select('stock_code, stock_name, market, price, change_rate, market_cap')
        .or(`stock_name.ilike.%${q}%,stock_code.ilike.%${q}%`)
        .gt('price', 0)
        .order('market_cap', { ascending: false, nullsFirst: false })
        .limit(15);

      if (!data || data.length === 0) {
        dd.innerHTML = '<div style="padding:12px 14px;font-size:13px;color:var(--muted);">검색 결과 없음</div>';
        dd.style.display = 'block';
        return;
      }

      dropdownIdx = -1;
      dd.innerHTML = data.map((s, i) => {
        const sign = (s.change_rate||0) >= 0 ? '+' : '';
        const cls  = (s.change_rate||0) >= 0 ? 'color:#0f6e56' : 'color:#a32d2d';
        const cap  = s.market_cap ? `${s.market_cap.toLocaleString()}억` : '';
        return `<div class="stock-dd-item" data-idx="${i}"
          data-code="${s.stock_code}" data-name="${s.stock_name}"
          data-market="${s.market}" data-price="${s.price||0}"
          data-cap="${s.market_cap||0}" data-change="${s.change_rate||0}"
          onclick="selectStock(this)"
          style="display:flex;justify-content:space-between;align-items:center;
                 padding:9px 14px;cursor:pointer;border-bottom:0.5px solid var(--border);font-size:13px;">
          <div>
            <span style="font-weight:500;">${s.stock_name}</span>
            <span style="color:var(--muted);font-size:11px;margin-left:6px;">${s.stock_code} · ${s.market}</span>
          </div>
          <div style="text-align:right;">
            <div style="font-weight:500;">${s.price ? s.price.toLocaleString()+'원' : '-'}</div>
            <div style="font-size:11px;${cls}">${s.price ? sign+(s.change_rate||0).toFixed(2)+'%' : ''}
              ${cap ? `<span style="color:var(--muted);margin-left:4px;">${cap}</span>` : ''}</div>
          </div>
        </div>`;
      }).join('');

      dd.style.display = 'block';

      // hover 스타일
      dd.querySelectorAll('.stock-dd-item').forEach(el => {
        el.addEventListener('mouseenter', () => el.style.background = 'var(--bg)');
        el.addEventListener('mouseleave', () => el.style.background = '');
      });

    } catch(e) {
      console.error('종목 검색 오류:', e);
    }
  }, 300);
}

// 키보드 탐색
function onStockSearchKey(e) {
  const dd = document.getElementById('stockDropdown');
  const items = dd.querySelectorAll('.stock-dd-item');
  if (!items.length || dd.style.display === 'none') return;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    dropdownIdx = Math.min(dropdownIdx + 1, items.length - 1);
    items.forEach((el, i) => el.style.background = i === dropdownIdx ? 'var(--bg)' : '');
    items[dropdownIdx]?.scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    dropdownIdx = Math.max(dropdownIdx - 1, 0);
    items.forEach((el, i) => el.style.background = i === dropdownIdx ? 'var(--bg)' : '');
    items[dropdownIdx]?.scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'Enter' && dropdownIdx >= 0) {
    e.preventDefault();
    selectStock(items[dropdownIdx]);
  } else if (e.key === 'Escape') {
    dd.style.display = 'none';
  }
}

// 종목 선택
function selectStock(el) {
  const code    = el.dataset.code;
  const name    = el.dataset.name;
  const market  = el.dataset.market;
  const price   = parseInt(el.dataset.price) || 0;
  const cap     = parseInt(el.dataset.cap)   || 0;
  const change  = parseFloat(el.dataset.change) || 0;

  // hidden inputs 채우기
  document.getElementById('f-stock').value  = name;
  document.getElementById('f-code').value   = code;
  document.getElementById('f-market').value = market;

  // 드롭다운 닫기
  document.getElementById('stockDropdown').style.display = 'none';

  // 선택 확인 배지
  const badge = document.getElementById('selectedStock');
  const sign  = change >= 0 ? '+' : '';
  const cls   = change >= 0 ? 'color:#0f6e56' : 'color:#a32d2d';
  document.getElementById('selectedStockText').innerHTML =
    `✅ <strong>${name}</strong> <span style="color:var(--muted)">${code} · ${market}</span>`;
  badge.style.display = 'block';

  // 현재가·시총 자동 입력
  if (price > 0) {
    document.getElementById('f-cur-price').value = price;
    // DB 원래 가격 보존 (현재가 수정 시 시총 역산용)
    document.getElementById('f-db-price').value = price;
    document.getElementById('f-db-cap').value   = cap;

    // 결과 박스 표시
    document.getElementById('lookupSource').textContent =
      `${code} · ${name} · DB 저장 가격`;
    document.getElementById('r-price').textContent  = price.toLocaleString() + '원';
    document.getElementById('r-price').className    = 'price-cell-value';
    document.getElementById('r-change').textContent = `${sign}${change.toFixed(2)}%`;
    document.getElementById('r-change').className   = `price-cell-value ${change >= 0 ? 'up' : 'dn'}`;
    const capEl = document.getElementById('r-cap');
    if (cap > 0) {
      capEl.textContent = cap.toLocaleString() + '억원';
      document.getElementById('f-cur-cap').value = cap;
    } else {
      capEl.textContent = '직접 입력';
    }
    document.getElementById('lookupResult').style.display = 'block';
    calcUpsidePreview();
    calcCapUpside();
  }
}

function clearSelectedStock() {
  document.getElementById('f-stock').value  = '';
  document.getElementById('f-code').value   = '';
  document.getElementById('f-market').value = 'KOSPI';
  document.getElementById('f-cur-price').value = '';
  document.getElementById('f-cur-cap').value   = '';
  document.getElementById('f-db-price').value  = '';
  document.getElementById('f-db-cap').value    = '';
  document.getElementById('selectedStock').style.display   = 'none';
  document.getElementById('lookupResult').style.display    = 'none';
  document.getElementById('upsidePreview').style.display   = 'none';
  document.getElementById('capUpsidePreview').style.display = 'none';
  document.getElementById('f-stock').focus();
}

// 외부 클릭 시 드롭다운 닫기
document.addEventListener('click', (e) => {
  if (!e.target.closest('#f-stock') && !e.target.closest('#stockDropdown')) {
    document.getElementById('stockDropdown').style.display = 'none';
  }
});

// ── 목표주가 입력 → 목표시총 자동 계산
function onTargetPriceInput() {
  calcUpsidePreview();

  const curPrice  = parseInt(document.getElementById('f-cur-price').value);
  const curCap    = parseInt(document.getElementById('f-cur-cap').value);
  const tgtPrice  = parseInt(document.getElementById('f-target-price').value);
  const tgtCapEl  = document.getElementById('f-tgt-cap');

  if (curPrice > 0 && curCap > 0 && tgtPrice > 0) {
    const tgtCap = Math.round(curCap * (tgtPrice / curPrice));
    tgtCapEl.value = tgtCap;
    calcCapUpside();
  }
}

// ── 목표시총 입력 → 목표주가 자동 계산
function onTargetCapInput() {
  calcCapUpside();

  const curPrice  = parseInt(document.getElementById('f-cur-price').value);
  const curCap    = parseInt(document.getElementById('f-cur-cap').value);
  const tgtCap    = parseInt(document.getElementById('f-tgt-cap').value);
  const tgtPriceEl = document.getElementById('f-target-price');

  if (curPrice > 0 && curCap > 0 && tgtCap > 0) {
    const tgtPrice = Math.round(curPrice * (tgtCap / curCap));
    tgtPriceEl.value = tgtPrice;
    calcUpsidePreview();
  }
}

// ── 현재가 수정 시 현재 시총 자동 역산
function onCurPriceInput() {
  const newPrice = parseInt(document.getElementById('f-cur-price').value);
  const dbPrice  = parseInt(document.getElementById('f-db-price').value);
  const dbCap    = parseInt(document.getElementById('f-db-cap').value);

  // DB 원래 가격과 시총이 있으면 비율로 역산
  if (newPrice > 0 && dbPrice > 0 && dbCap > 0) {
    const newCap = Math.round(dbCap * (newPrice / dbPrice));
    document.getElementById('f-cur-cap').value = newCap;

    // 시총 표시 업데이트
    const capEl = document.getElementById('r-cap');
    if (capEl) capEl.textContent = newCap.toLocaleString() + '억원';
  }

  // 기존 목표주가↔시총 연동도 재계산
  calcUpsidePreview();
  onTargetPriceInput(); // 목표주가가 있으면 목표시총 재계산
}

function calcUpsidePreview() {
  const cur = parseInt(document.getElementById('f-cur-price').value);
  const tgt = parseInt(document.getElementById('f-target-price').value);
  if (!cur || !tgt) { document.getElementById('upsidePreview').style.display = 'none'; return; }
  const u = ((tgt - cur) / cur * 100).toFixed(1);
  document.getElementById('upsideText').innerHTML =
    `주가 기준 상승여력: ${won(cur)} → ${won(tgt)} &nbsp;<strong>(${u >= 0 ? '+' : ''}${u}%)</strong>`;
  document.getElementById('upsidePreview').style.display = 'block';
}

function calcCapUpside() {
  const cur = parseInt(document.getElementById('f-cur-cap').value);
  const tgt = parseInt(document.getElementById('f-tgt-cap').value);
  if (!cur || !tgt) { document.getElementById('capUpsidePreview').style.display = 'none'; return; }
  const u = ((tgt - cur) / cur * 100).toFixed(1);
  document.getElementById('capUpsideText').innerHTML =
    `시총 기준 상승여력: ${cur.toLocaleString()}억 → ${tgt.toLocaleString()}억 &nbsp;<strong>(+${u}%)</strong>`;
  document.getElementById('capUpsidePreview').style.display = 'block';
}

// ── 월 탭
function buildMonthTabs() {
  const months = [...new Set(allPicks.map(p => p.month))].sort().reverse();
  if (!months.includes(selMonth)) months.unshift(selMonth);
  document.getElementById('monthTabs').innerHTML = months.slice(0,8).map(m => {
    const label = m.replace('-','년 ') + '월';
    return `<div class="tab ${m===selMonth?'active':''}" onclick="switchMonth('${m}',this)">${label}</div>`;
  }).join('');
}

function switchMonth(month, el) {
  selMonth = month;
  document.querySelectorAll('#monthTabs .tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderMonthPicks(month);
}

function renderMonthPicks(month) {
  const picks = allPicks.filter(p => p.month === month);
  const tbody = document.getElementById('monthPicksTbody');
  if (!picks.length) {
    tbody.innerHTML = `<tr><td colspan="9" class="empty-cell">${month} 탑픽 없음</td></tr>`;
    document.getElementById('reasonCards').innerHTML = '';
    return;
  }
  tbody.innerHTML = picks.map((p, i) => {
    const r = p.realized_return;
    const upside = p.target_cap && p.current_cap
      ? (((p.target_cap - p.current_cap) / p.current_cap) * 100).toFixed(1) : null;
    const statusBadge = p.status==='sold'
      ? '<span class="badge b-sold">매도완료</span>'
      : '<span class="badge b-hold">보유중</span>';
    return `<tr>
      <td><div class="flex"><div class="avatar ${avCls[i%6]}">${(p.member_name||'').slice(0,2)}</div>${p.member_name}</div></td>
      <td style="font-weight:500;">${p.stock_name}<br><span style="font-size:11px;color:var(--muted);">${p.stock_code||''}</span></td>
      <td><span class="badge b-hold">${p.market||'KOSPI'}</span></td>
      <td>${won(p.buy_price)}</td>
      <td>${won(p.sell_price)}</td>
      <td class="${rCls(r)}">${pct(r)}</td>
      <td style="color:var(--green);">${won(p.target_price)}</td>
      <td>${upside ? `<span style="color:var(--green);">+${upside}%</span>` : '-'}</td>
      <td>${statusBadge}</td>
    </tr>`;
  }).join('');

  document.getElementById('reasonCards').innerHTML = picks.map(p => `
    <div style="background:var(--bg);border-radius:var(--r-md);padding:12px 14px;">
      <div style="font-size:13px;font-weight:500;margin-bottom:4px;">${p.member_name} · ${p.stock_name}
        ${p.stock_code ? `<span style="font-size:11px;color:var(--muted);font-weight:400;">(${p.stock_code})</span>` : ''}
      </div>
      <div style="font-size:12px;color:var(--muted);line-height:1.7;">${p.reason||'사유 미입력'}</div>
    </div>`).join('');
}

function renderHistory(filtered) {
  const picks = filtered || allPicks;
  const tbody = document.getElementById('historyTbody');
  if (!picks.length) {
    tbody.innerHTML = '<tr><td colspan="9" class="empty-cell">데이터 없음</td></tr>';
    return;
  }
  tbody.innerHTML = picks.map((p, i) => {
    const r = p.realized_return;
    const statusBadge = p.status==='sold'
      ? '<span class="badge b-sold">매도완료</span>'
      : '<span class="badge b-hold">보유중</span>';
    return `<tr>
      <td class="muted">${(p.month||'').replace('-','년 ')}월</td>
      <td><div class="flex"><div class="avatar ${avCls[i%6]}">${(p.member_name||'').slice(0,2)}</div></div></td>
      <td style="font-weight:500;">${p.stock_name}</td>
      <td class="muted">${p.market||''}</td>
      <td>${won(p.buy_price)}</td>
      <td>${won(p.sell_price)}</td>
      <td class="${rCls(r)}">${pct(r)}</td>
      <td>${statusBadge}</td>
      <td style="font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;">${p.reason||'-'}</td>
    </tr>`;
  }).join('');
}

function applyFilter() {
  const memberId = document.getElementById('filterMember').value;
  const status   = document.getElementById('filterStatus').value;
  renderHistory(allPicks.filter(p =>
    (!memberId || p.member_id === memberId) &&
    (!status   || p.status === status)
  ));
}

function openPickForm() {
  ['lookupResult','lookupError','lookupLoading','upsidePreview','capUpsidePreview','selectedStock','stockDropdown']
    .forEach(id => { const el = document.getElementById(id); if(el) el.style.display = 'none'; });
  document.getElementById('f-stock').value     = '';
  document.getElementById('f-code').value      = '';
  document.getElementById('f-market').value    = 'KOSPI';
  document.getElementById('f-cur-price').value = '';
  document.getElementById('f-cur-cap').value   = '';
  document.getElementById('f-month').value     = selMonth;
  document.getElementById('pickFormModal').style.display = 'flex';
  setTimeout(() => document.getElementById('f-stock').focus(), 200);
}
function closePickForm() {
  document.getElementById('pickFormModal').style.display = 'none';
}
document.getElementById('pickFormModal').addEventListener('click', e => {
  if (e.target === document.getElementById('pickFormModal')) closePickForm();
});
function toggleForm() { openPickForm(); } // 하위 호환

async function submitPickForm() {
  const me = await getCurrentMember();
  if (!me) { toast('로그인 정보를 찾을 수 없습니다.'); return; }
  const memberId = me.id;

  const month       = document.getElementById('f-month').value;
  const stockName   = document.getElementById('f-stock').value.trim();
  const stockCode   = document.getElementById('f-code').value.trim();
  const market      = document.getElementById('f-market').value;
  const curPrice    = parseInt(document.getElementById('f-cur-price').value) || null;
  const targetPrice = parseInt(document.getElementById('f-target-price').value) || null;
  const currentCap  = parseInt(document.getElementById('f-cur-cap').value) || null;
  const targetCap   = parseInt(document.getElementById('f-tgt-cap').value) || null;
  const reason      = document.getElementById('f-reason').value.trim();

  if (!month || !stockName) {
    toast('대상 월과 종목명은 필수입니다.');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.textContent = '제출 중...';
  btn.disabled = true;

  try {
    await submitPick({
      member_id: memberId, month, stock_name: stockName, stock_code: stockCode,
      market, target_price: targetPrice, current_cap: currentCap,
      target_cap: targetCap, reason
    });
    toast('탑픽이 제출되었습니다!');
    closePickForm();
    allPicks = await fetchAllPicks();
    buildMonthTabs();
    renderMonthPicks(selMonth);
    renderHistory();
  } catch(e) {
    toast('오류: ' + (e.message || '제출 실패'));
  } finally {
    btn.textContent = '제출';
    btn.disabled = false;
  }
}


init();
if (new URLSearchParams(location.search).get('action') === 'new') {
  setTimeout(openPickForm, 300);
}
</script>
</body>
</html>
