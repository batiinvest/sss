      width: 100%;
      height: 100%;
      background: var(--bg);
      opacity: 1;
      transition: opacity 0.12s ease;
      display: block;
    }
    #page-frame.switching { opacity: 0; }

    /* 모바일 */

        height: 100vh;
        overflow: hidden;
      }

        flex-shrink: 0;
        height: auto !important;
        position: sticky !important;
        top: 0 !important;
        z-index: 200 !important;
      }
      #page-frame {
        flex: 1;
        height: 0; /* flex child가 남은 공간 채우도록 */
        min-height: 0;
      }
    }
  </style>

<script src="js/db.js?v=20260417"></script>
<script>
let currentPage = 'index';

function loadPage(pageName) {
  if (currentPage === pageName) return;
  currentPage = pageName;

  // active 메뉴 표시
  document.querySelectorAll('.nav-item[data-page]').forEach(el => {
    el.classList.toggle('active', el.dataset.page === pageName);
  });

  // URL 해시 업데이트
  history.pushState({ page: pageName }, '', '#' + pageName);

  // iframe fade 전환
  const frame = document.getElementById('page-frame');
  frame.classList.add('switching');

  setTimeout(() => {
    frame.src = pageName + '.html?v=20260417';
    frame.onload = () => {
      frame.classList.remove('switching');
      // 모바일: 햄버거 닫기
      document.querySelector('.sidebar')?.classList.remove('nav-open');
    };
  }, 120);
}

// 뒤로가기/앞으로가기
window.addEventListener('popstate', (e) => {
  const page = e.state?.page || 'index';
  if (page !== currentPage) loadPage(page);
});

// 로그아웃
async function doLogout() {
  sessionStorage.removeItem('sideProfileData');
  sessionStorage.removeItem('app_authenticated');
  await sb.auth.signOut();
  location.reload();
}

// iframe에서 세션 만료 메시지 수신
window.addEventListener('message', (e) => {
  if (e.data === 'session_expired') {
    doLogout();
  }
});

// 초기 실행
async function initApp() {
  await requireAuth();
  initSidebarAuth();

  // 인증 완료 표시 (iframe에서 세션 공유 확인용)
  sessionStorage.setItem('app_authenticated', '1');

  const hash = location.hash.replace('#', '');
  if (hash && hash !== 'index') {
    loadPage(hash);
  } else {
    document.querySelector('[data-page="index"]')?.classList.add('active');
    history.replaceState({ page: 'index' }, '', '#index');
  }
}

initApp();
</script>
