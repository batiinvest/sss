name: 전종목 현재가 업데이트 (장 마감)

on:
  schedule:
    - cron: '10 7 * * 1-5'   # KST 16:10 장 마감 후 (UTC 07:10)
  workflow_dispatch:           # 수동 실행 가능

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 패키지 설치
        run: pip install finance-datareader -q

      - name: 전종목 현재가 업데이트
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 - << 'PYEOF'
          import json, os, ssl, time, datetime
          import urllib.request
          import FinanceDataReader as fdr

          SUPABASE_URL = os.environ['SUPABASE_URL']
          SERVICE_KEY  = os.environ['SUPABASE_SERVICE_KEY']
          ctx = ssl.create_default_context()

          sb_headers = {
            'apikey': SERVICE_KEY,
            'Authorization': 'Bearer ' + SERVICE_KEY,
            'Content-Type': 'application/json',
            'Prefer': 'resolution=merge-duplicates,return=minimal',
          }

          import urllib.error
          def upsert_batch(rows):
            data = json.dumps(rows).encode('utf-8')
            req = urllib.request.Request(
              SUPABASE_URL + '/rest/v1/stock_prices',
              data=data, headers=sb_headers, method='POST'
            )
            try:
              with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
                r.read()
            except urllib.error.HTTPError as e:
              body = e.read().decode('utf-8', errors='replace')
              print(f'HTTP {e.code} 오류: {body[:200]}')
              raise

          now_iso = datetime.datetime.now(datetime.timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')

          print('KRX 전종목 시세 로딩...')
          kospi  = fdr.StockListing('KOSPI')
          kosdaq = fdr.StockListing('KOSDAQ')
          print(f'KOSPI: {len(kospi)}개, KOSDAQ: {len(kosdaq)}개')

          rows = []
          for df, market in [(kospi, 'KOSPI'), (kosdaq, 'KOSDAQ')]:
            for _, row in df.iterrows():
              code = str(row.get('Code', '')).strip().zfill(6)
              name = str(row.get('Name', '')).strip()
              if not code or not name or code == '000000' or name == 'nan':
                continue
              try:
                price = int(float(row.get('Close', 0) or 0))
              except:
                price = 0
              if price == 0:
                continue
              try:
                market_cap = int(float(row.get('Marcap', 0) or 0) // 100_000_000) or None
              except:
                market_cap = None
              try:
                change_rate = round(float(row.get('ChagesRatio', 0) or 0), 2)
              except:
                change_rate = 0.0
              rows.append({
                'stock_code':  code,
                'stock_name':  name,
                'market':      market,
                'price':       price,
                'change_rate': change_rate,
                'market_cap':  market_cap,
                'updated_at':  now_iso,
              })

          print(f'업데이트 대상: {len(rows)}개')

          BATCH = 100
          saved = 0
          for i in range(0, len(rows), BATCH):
            batch = rows[i:i+BATCH]
            try:
              upsert_batch(batch)
              saved += len(batch)
              if (i // BATCH) % 20 == 0:
                print(f'  저장: {saved}/{len(rows)}')
            except Exception as e:
              print(f'  배치 오류: {e}')
            time.sleep(0.05)

          print(f'✅ 전종목 업데이트 완료: {saved}개')
          PYEOF
