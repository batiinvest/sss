<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSS · 참여자 현황</title>
  <link rel="stylesheet" href="css/style.css?v=20260427">
  <script>if(window!==window.parent){document.documentElement.classList.add("in-iframe");}</script>
  <style>
    .member-card { cursor:pointer; transition:box-shadow .15s; }
    .member-card:hover { box-shadow:0 0 0 2px var(--accent); }
    .member-card.expanded { box-shadow:0 0 0 2px var(--accent); }
    .hist-wrap { display:none; margin-top:14px; padding-top:14px; border-top:0.5px solid var(--border); }
    .member-card.expanded .hist-wrap { display:block; }
    .hist-wrap table { width:100%; font-size:12px; border-collapse:collapse; }
    .hist-wrap th { background:var(--bg); padding:6px 8px; font-weight:500; color:var(--muted); text-align:left; }
    .hist-wrap td { padding:6px 8px; border-bottom:0.5px solid var(--border); }
    .expand-hint { font-size:11px; color:var(--muted); margin-top:8px; text-align:right; }
  </style>
</head>
<body>
<div class="layout layout-page"><main class="main">

  <div class="topbar">
    <div>
      <div class="page-title">참여자 현황</div>
      <div class="updated">확정 결산 기준 누적 수익률 · 카드 클릭 시 종목 히스토리 표시</div>
    </div>
  </div>

  <!-- 참여자 카드 그리드 -->
  <div id="memberCards" class="grid-2 mb-card" style="grid-template-columns:repeat(2,minmax(0,1fr));"></div>

</main></div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js?v=20260427"></script>
<script src="js/db.js?v=20260427"></script>
<script>
let members = [], allTrades = [], allPicks = [], settlements = [];
let expandedId = null;   // 현재 펼쳐진 멤버 ID

async function init() {
  await requireAuth();
  [members, allPicks, settlements, allTrades] = await Promise.all([
    fetchMemberStats(), fetchAllPicks(), fetchSettlements(), fetchAllTrades()
  ]);
  renderMemberCards();
}

function renderMemberCards() {
  const totalInitial = members.length * (typeof BASE_AMOUNT !== 'undefined' ? BASE_AMOUNT : 500000);
  document.getElementById('memberCards').innerHTML = members.map((m, i) => {
    const picks      = allPicks.filter(p => p.member_id === m.id);
    const mySettles  = settlements.filter(s => s.member_id === m.id);
    const myBuy      = allTrades.filter(t => t.member_id === m.id && t.trade_type === 'buy')
                         .reduce((s,t) => s + t.price * t.quantity, 0);
    const mySell     = allTrades.filter(t => t.member_id === m.id && t.trade_type === 'sell')
                         .reduce((s,t) => s + t.price * t.quantity, 0);
    const myInvested = myBuy - mySell;
    const myCash     = m.base_amount - myInvested;
    const bestPick   = mySettles.reduce((best, s) =>
      (s.return_rate > (best?.return_rate || -Infinity) ? s : best), null);
    const winCount   = mySettles.filter(s => s.net_profit > 0).length;
    const winRate    = mySettles.length ? Math.round(winCount / mySettles.length * 100) : 0;
    const barW       = Math.min(Math.abs(m.return_rate) * 4, 100);
    const barC       = m.return_rate >= 0 ? 'bar-up' : 'bar-dn';
    const isExpanded = expandedId === m.id;

    // 히스토리 테이블 (펼쳐질 때 렌더)
    const histRows = picks.length
      ? (() => {
          let runningBase = typeof BASE_AMOUNT !== 'undefined' ? BASE_AMOUNT : 500000;
          return picks.map(p => {
            const settle = mySettles.find(s => s.pick_id === p.pick_id);
            if (settle) runningBase = settle.new_base_amount || runningBase + (settle.net_profit || 0);
            const r = p.realized_return;
            return `<tr>
              <td class="muted">${(p.month||'').replace('-','년 ')}월</td>
              <td style="font-weight:500;">${p.stock_name}</td>
              <td>${won(p.buy_price)}</td>
              <td>${won(p.sell_price)}</td>
              <td class="${rCls(r)}">${pct(r)}</td>
              <td class="${rCls(settle?.net_profit)}">${settle ? (settle.net_profit>=0?'+':'')+won(settle.net_profit) : '—'}</td>
              <td>${statusBadge(p.status)}</td>
            </tr>`;
          }).join('');
        })()
      : `<tr><td colspan="7" class="empty-cell">종목 없음</td></tr>`;

    return `<div class="card member-card ${isExpanded ? 'expanded' : ''}" onclick="toggleHistory('${m.id}')">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
        <div class="avatar ${avCls[i%6]}" style="width:40px;height:40px;font-size:14px;">${m.name.slice(0,2)}</div>
        <div>
          <div style="font-size:15px;font-weight:500;">${m.name}</div>
          <div style="font-size:12px;color:var(--muted);">참여일 ${m.joined_at}</div>
        </div>
        <div style="margin-left:auto;text-align:right;">
          <div class="metric-value ${m.return_rate>=0?'up':'dn'}" style="font-size:20px;">${pct(m.return_rate)}</div>
          <div style="font-size:11px;color:var(--muted);">누적 수익률</div>
        </div>
      </div>
      <div style="height:5px;background:var(--bg);border-radius:4px;overflow:hidden;margin-bottom:14px;">
        <div class="prog-bar ${barC}" style="width:${barW}%;"></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
        <div style="background:var(--bg);border-radius:var(--r-md);padding:8px 10px;">
          <div style="font-size:11px;color:var(--muted);">기준금액</div>
          <div style="font-size:13px;font-weight:500;">${won(m.base_amount)}</div>
        </div>
        <div style="background:var(--bg);border-radius:var(--r-md);padding:8px 10px;">
          <div style="font-size:11px;color:var(--muted);">투자금</div>
          <div style="font-size:13px;font-weight:500;">${won(myInvested)}</div>
        </div>
        <div style="background:var(--bg);border-radius:var(--r-md);padding:8px 10px;">
          <div style="font-size:11px;color:var(--muted);">잔액</div>
          <div style="font-size:13px;font-weight:500;${myCash<0?'color:var(--up)':''}">${won(myCash)}</div>
        </div>
        <div style="background:var(--bg);border-radius:var(--r-md);padding:8px 10px;">
          <div style="font-size:11px;color:var(--muted);">승률</div>
          <div style="font-size:13px;font-weight:500;">${winRate}%</div>
        </div>
      </div>
      ${bestPick ? `<div style="margin-top:10px;font-size:12px;color:var(--muted);">최고 수익: <strong>${bestPick.picks?.stock_name||'—'}</strong> <span class="up">+${bestPick.return_rate}%</span></div>` : ''}
      <!-- 인라인 히스토리 (클릭 시 토글) -->
      <div class="hist-wrap" onclick="event.stopPropagation()">
        <div style="font-size:13px;font-weight:500;margin-bottom:8px;">📋 종목 히스토리 (${picks.length}건)</div>
        <div class="table-wrap" style="margin:0;">
          <table>
            <thead><tr>
              <th>월</th><th>종목</th><th>매수가</th><th>매도가</th><th>수익률</th><th>확정 손익</th><th>상태</th>
            </tr></thead>
            <tbody>${histRows}</tbody>
          </table>
        </div>
      </div>
      <div class="expand-hint">${isExpanded ? '▲ 접기' : '▼ 히스토리 보기'}</div>
    </div>`;
  }).join('');
}

function toggleHistory(memberId) {
  expandedId = (expandedId === memberId) ? null : memberId;
  renderMemberCards();
  // 펼쳐진 카드로 스크롤
  if (expandedId) {
    setTimeout(() => {
      const cards = document.querySelectorAll('.member-card');
      const idx   = members.findIndex(m => m.id === memberId);
      if (cards[idx]) cards[idx].scrollIntoView({ behavior:'smooth', block:'nearest' });
    }, 50);
  }
}

init();
</script>
</body>
</html>
