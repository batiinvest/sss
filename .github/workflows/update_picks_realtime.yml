name: 탑픽 현재가 업데이트 (장중 자동)

on:
  schedule:
    - cron: '0 1 * * 1-5'    # KST 10:00 (UTC 01:00)
    - cron: '0 4 * * 1-5'    # KST 13:00 (UTC 04:00)
    - cron: '30 6 * * 1-5'   # KST 15:30 (UTC 06:30)
  workflow_dispatch:

jobs:
  update-picks:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 패키지 설치
        run: pip install finance-datareader -q

      - name: 탑픽 종목 현재가 업데이트
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 - << 'PYEOF'
          import json, os, ssl, time, datetime
          import urllib.request
          import urllib.error
          import FinanceDataReader as fdr

          SUPABASE_URL = os.environ.get('SUPABASE_URL', '').rstrip('/')
          SERVICE_KEY  = os.environ.get('SUPABASE_SERVICE_KEY', '')

          if not SUPABASE_URL or not SERVICE_KEY:
            print('❌ SUPABASE_URL 또는 SUPABASE_SERVICE_KEY 환경변수가 없습니다.')
            print('   GitHub 저장소 Settings > Secrets and variables > Actions 에서 설정하세요.')
            exit(1)

          print(f'Supabase URL: {SUPABASE_URL[:40]}...')
          print(f'Service Key: {SERVICE_KEY[:20]}...')

          ctx = ssl.create_default_context()

          HEADERS_READ = {
            'apikey': SERVICE_KEY,
            'Authorization': 'Bearer ' + SERVICE_KEY,
          }
          HEADERS_WRITE = {
            **HEADERS_READ,
            'Content-Type': 'application/json',
            'Prefer': 'resolution=merge-duplicates,return=minimal',
          }

          def sb_get(path):
            req = urllib.request.Request(SUPABASE_URL + path, headers=HEADERS_READ)
            with urllib.request.urlopen(req, context=ctx, timeout=20) as r:
              return json.loads(r.read())

          def sb_upsert(rows):
            data = json.dumps(rows).encode('utf-8')
            req = urllib.request.Request(
              SUPABASE_URL + '/rest/v1/stock_prices',
              data=data, headers=HEADERS_WRITE, method='POST'
            )
            try:
              with urllib.request.urlopen(req, context=ctx, timeout=20) as r:
                r.read()
                print(f'  HTTP {r.status} OK')
            except urllib.error.HTTPError as e:
              body = e.read().decode('utf-8', errors='replace')
              print(f'  ❌ HTTP {e.code}: {body[:200]}')
              raise

          # 1. 보유 중인 탑픽 조회
          print('\n📋 보유 탑픽 조회 중...')
          try:
            picks = sb_get(
              '/rest/v1/picks_with_trades'
              '?select=stock_code,stock_name,market'
              '&status=eq.hold'
              '&stock_code=not.is.null'
            )
          except urllib.error.HTTPError as e:
            body = e.read().decode('utf-8', errors='replace')
            print(f'❌ 탑픽 조회 실패 HTTP {e.code}: {body[:300]}')
            exit(1)

          if not picks:
            print('보유 중인 탑픽 없음')
            exit(0)

          code_map = {}
          for p in picks:
            code = p.get('stock_code')
            if code:
              code_map[code] = p
          codes = list(code_map.keys())
          print(f'탑픽: {len(codes)}개 → {codes}')

          now_iso = datetime.datetime.now(datetime.timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')

          # 2. KRX 시세 조회
          rows = []
          for market_name, df in [('KOSPI', fdr.StockListing('KOSPI')),
                                   ('KOSDAQ', fdr.StockListing('KOSDAQ'))]:
            for _, row in df.iterrows():
              code = str(row.get('Code', '')).strip().zfill(6)
              if code not in code_map:
                continue
              try: price = int(float(row.get('Close', 0) or 0))
              except: price = 0
              if price == 0: continue
              try: market_cap = int(float(row.get('Marcap', 0) or 0) // 100_000_000) or None
              except: market_cap = None
              try: change_rate = round(float(row.get('ChagesRatio', 0) or 0), 2)
              except: change_rate = 0.0

              rows.append({
                'stock_code':  code,
                'stock_name':  code_map[code].get('stock_name', ''),
                'market':      market_name,
                'price':       price,
                'change_rate': change_rate,
                'market_cap':  market_cap,
                'updated_at':  now_iso,
              })
              print(f'  {code} {code_map[code].get("stock_name")} → {price:,}원 ({change_rate:+.2f}%)')

          if not rows:
            print('KRX에서 가격 데이터 없음')
            exit(0)

          # 3. Supabase 저장
          print(f'\n💾 {len(rows)}개 저장 중...')
          sb_upsert(rows)
          print(f'✅ 완료: {len(rows)}개 업데이트')
          PYEOF
