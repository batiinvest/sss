<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSS · 내 정보</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="layout" style="display:block;"><main class="main">
    <div id="db-banner" class="db-banner pending">DB 연결 확인 중...</div>

    <div class="topbar">
      <div>
        <div class="page-title">내 정보</div>
        <div class="updated" id="pageSubtitle">불러오는 중...</div>
      </div>
      <button class="btn btn-primary" onclick="openEditForm()">✏️ 정보 수정</button>
    </div>

    <!-- 정보 수정 폼 -->
    <div id="editForm" class="card" style="display:none;margin-bottom:1.25rem;">
      <div class="card-head">
        <div class="card-title">정보 수정</div>
        <button class="btn" onclick="closeEditForm()" style="font-size:12px;">닫기</button>
      </div>
      <div class="form-section">
        <!-- 프로필 수정 -->
        <div style="font-size:12px;font-weight:500;color:var(--muted);margin-bottom:8px;letter-spacing:0.05em;">기본 정보</div>
        <div class="form-row">
          <div class="form-group">
            <label>이름</label>
            <input type="text" id="edit-name" placeholder="이름" />
          </div>
          <div class="form-group">
            <label>전화번호</label>
            <input type="text" id="edit-phone" placeholder="010-0000-0000" />
          </div>
        </div>
        <div class="form-group">
          <label>메모</label>
          <input type="text" id="edit-note" placeholder="투자 스타일, 메모 등" />
        </div>
        <div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:1.25rem;">
          <button class="btn btn-primary" onclick="saveProfile()">프로필 저장</button>
        </div>

        <!-- 비밀번호 변경 -->
        <div style="border-top:0.5px solid var(--border);padding-top:1rem;">
          <div style="font-size:12px;font-weight:500;color:var(--muted);margin-bottom:8px;letter-spacing:0.05em;">비밀번호 변경</div>
          <div class="form-row">
            <div class="form-group">
              <label>새 비밀번호</label>
              <input type="password" id="edit-pw" placeholder="새 비밀번호 (6자 이상)" />
            </div>
            <div class="form-group">
              <label>비밀번호 확인</label>
              <input type="password" id="edit-pw2" placeholder="비밀번호 재입력" />
            </div>
          </div>
          <div id="pwMsg" style="font-size:12px;min-height:16px;margin-bottom:8px;"></div>
          <div style="display:flex;justify-content:flex-end;gap:8px;">
            <button class="btn" onclick="closeEditForm()">닫기</button>
            <button class="btn btn-primary" onclick="changePassword()">비밀번호 변경</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 프로필 카드 -->
    <div class="card" style="margin-bottom:1.25rem;">
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
        <div id="profileAvatar" class="avatar av1" style="width:52px;height:52px;font-size:18px;">—</div>
        <div style="flex:1;">
          <div style="font-size:18px;font-weight:500;" id="profileName">—</div>
          <div style="font-size:13px;color:var(--muted);margin-top:2px;" id="profileEmail">—</div>
          <div style="font-size:13px;color:var(--muted);" id="profilePhone">—</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:12px;color:var(--muted);">참여일</div>
          <div style="font-size:13px;font-weight:500;" id="profileJoined">—</div>
          <div style="font-size:12px;color:var(--muted);margin-top:4px;" id="profileNote">—</div>
        </div>
      </div>
    </div>

    <!-- 핵심 지표 -->
    <div class="metric-grid" style="grid-template-columns:repeat(3,minmax(0,1fr));margin-bottom:1.25rem;" id="myMetricGrid">
      <div class="metric">
        <div class="metric-label">기준금액</div>
        <div class="metric-value" id="myBaseAmount">—</div>
        <div class="metric-sub" id="myBaseAmountSub">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">누적 수익률</div>
        <div class="metric-value" id="myReturnRate">—</div>
        <div class="metric-sub" id="myReturnSub">확정 결산 기준</div>
      </div>
      <div class="metric">
        <div class="metric-label">투자금 / 잔액</div>
        <div class="metric-value" id="myInvested">—</div>
        <div class="metric-sub" id="myCash">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">총 발표 종목</div>
        <div class="metric-value" id="myPresCount">—</div>
        <div class="metric-sub">기업 + 산업 분석</div>
      </div>
      <div class="metric">
        <div class="metric-label">탑픽 제출 수</div>
        <div class="metric-value" id="myPickCount">—</div>
        <div class="metric-sub" id="myPickSub">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">결산 승률</div>
        <div class="metric-value" id="myWinRate">—</div>
        <div class="metric-sub" id="myWinSub">확정 결산 기준</div>
      </div>
    </div>

    <!-- 보유 탑픽 -->
    <div class="card" style="margin-bottom:1.25rem;">
      <div class="card-head">
        <div class="card-title">보유 탑픽</div>
        <a href="picks.html" style="font-size:12px;color:var(--accent);text-decoration:none;">전체 →</a>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>월</th><th>종목</th><th>매수가</th><th>현재가</th><th>평가손익</th><th>목표가</th><th>상태</th>
          </tr></thead>
          <tbody id="myPicksTbody">
            <tr><td colspan="7" class="muted" style="text-align:center;padding:1.5rem;">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 발표 히스토리 -->
    <div class="card" style="margin-bottom:1.25rem;">
      <div class="card-head">
        <div class="card-title">내 발표 히스토리</div>
        <div style="font-size:12px;color:var(--muted);" id="myPresAvg">—</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>발표일</th><th>구분</th><th>종목</th><th>발표 당시가</th><th>현재가</th><th>수익률</th>
          </tr></thead>
          <tbody id="myPresTbody">
            <tr><td colspan="6" class="muted" style="text-align:center;padding:1.5rem;">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 결산 내역 -->
    <div class="card">
      <div class="card-head">
        <div class="card-title">결산 내역</div>
        <a href="settle.html" style="font-size:12px;color:var(--accent);text-decoration:none;">전체 →</a>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>결산일</th><th>종목</th><th>매수가</th><th>매도가</th><th>수익률</th><th>순손익</th>
          </tr></thead>
          <tbody id="mySettlesTbody">
            <tr><td colspan="6" class="muted" style="text-align:center;padding:1.5rem;">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js?v=20260412"></script>
<script src="js/db.js?v=20260412"></script>
<script>
let myMember    = null;
let myPriceMap  = {};

async function init() {
  await requireAuth();
  checkDBConnection();

  myMember = await getCurrentMember();
  if (!myMember) {
    document.getElementById('pageSubtitle').textContent =
      '멤버 정보를 찾을 수 없습니다. 관리자에게 이메일 연동을 요청하세요.';
    return;
  }

  document.getElementById('pageSubtitle').textContent =
    myMember.name + '님의 개인 정보 · 투자 현황';

  await Promise.all([
    renderProfile(),
    renderMetrics(),
    renderMyPicks(),
    renderMyPresentations(),
    renderMySettles(),
  ]);
}

// ── 프로필
function renderProfile() {
  const m = myMember;
  const avIdx = ['av1','av2','av3','av4','av1','av2'][0];
  document.getElementById('profileAvatar').className = 'avatar av1';
  document.getElementById('profileAvatar').style.cssText = 'width:52px;height:52px;font-size:18px;';
  document.getElementById('profileAvatar').textContent = m.name.slice(0,2);
  document.getElementById('profileName').textContent   = m.name;
  document.getElementById('profileEmail').textContent  = m.email || '이메일 미등록';
  document.getElementById('profilePhone').textContent  = m.phone || '전화번호 미등록';
  document.getElementById('profileJoined').textContent = m.joined_at || '—';
  document.getElementById('profileNote').textContent   = m.note || '';
}

// ── 핵심 지표
async function renderMetrics() {
  const m = myMember;
  const initBase = typeof BASE_AMOUNT !== 'undefined' ? BASE_AMOUNT : 500000;
  const profit   = (m.base_amount || 0) - initBase;
  const retRate  = ((m.base_amount - initBase) / initBase * 100).toFixed(1);

  document.getElementById('myBaseAmount').textContent = won(m.base_amount);
  document.getElementById('myBaseAmountSub').textContent =
    `초기 ${won(initBase)} 대비 ${profit >= 0 ? '+' : ''}${won(profit)}`;

  const retEl = document.getElementById('myReturnRate');
  retEl.textContent = (retRate >= 0 ? '+' : '') + retRate + '%';
  retEl.className   = 'metric-value ' + rCls(retRate);

  // 투자금 / 잔액
  const { data: trades } = await sb.from('trades')
    .select('trade_type,price,quantity')
    .eq('member_id', m.id);
  const bought = (trades||[]).filter(t => t.trade_type === 'buy')
    .reduce((s,t) => s + t.price * t.quantity, 0);
  const sold   = (trades||[]).filter(t => t.trade_type === 'sell')
    .reduce((s,t) => s + t.price * t.quantity, 0);
  const invested = bought - sold;
  const cash     = (m.base_amount || 0) - invested;

  document.getElementById('myInvested').textContent = won(invested);
  document.getElementById('myCash').textContent = `잔액 ${won(cash)}`;

  // 결산 승률
  const { data: settles } = await sb.from('settlements').select('net_profit').eq('member_id', m.id);
  const wins    = (settles||[]).filter(s => s.net_profit > 0).length;
  const total   = (settles||[]).length;
  const winRate = total ? Math.round(wins / total * 100) : 0;
  document.getElementById('myWinRate').textContent = total ? winRate + '%' : '—';
  document.getElementById('myWinSub').textContent  = total ? `${wins}승 / ${total}건` : '결산 없음';
}

// ── 보유 탑픽
async function renderMyPicks() {
  const { data: picks } = await sb.from('picks_with_trades')
    .select('*').eq('member_id', myMember.id)
    .order('submitted_at', { ascending: false });

  document.getElementById('myPickCount').textContent = (picks||[]).length + '건';
  const holds = (picks||[]).filter(p => p.status === 'hold');
  document.getElementById('myPickSub').textContent  =
    `보유 ${holds.length}건 · 매도 ${(picks||[]).length - holds.length}건`;

  const tbody = document.getElementById('myPicksTbody');
  if (!picks || !picks.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="muted" style="text-align:center;padding:1.5rem;">탑픽 없음</td></tr>';
    return;
  }

  // 현재가 조회
  const codes = [...new Set(holds.filter(p => p.stock_code).map(p => p.stock_code))];
  if (codes.length) {
    const { data: prices } = await sb.from('stock_prices')
      .select('stock_code,price,change_rate').in('stock_code', codes);
    for (const p of (prices||[])) myPriceMap[p.stock_code] = p;
  }

  tbody.innerHTML = picks.map(p => {
    const cur      = p.stock_code ? myPriceMap[p.stock_code] : null;
    const curPrice = cur?.price;
    const pnl      = (p.buy_price && p.buy_quantity && curPrice)
      ? (curPrice - p.buy_price) * p.buy_quantity : null;
    const pnlRate  = (p.buy_price && curPrice)
      ? ((curPrice - p.buy_price) / p.buy_price * 100).toFixed(1) : null;
    const statusBadge = p.status === 'hold'
      ? '<span class="badge b-hold">보유중</span>'
      : '<span class="badge b-sold">매도완료</span>';
    const upside = p.target_price && curPrice
      ? ((p.target_price - curPrice) / curPrice * 100).toFixed(1) : null;
    return `<tr>
      <td class="muted">${(p.month||'').replace('-','년 ')}월</td>
      <td style="font-weight:500;">${p.stock_name}</td>
      <td>${p.buy_price ? won(p.buy_price) : '—'}</td>
      <td>${curPrice ? curPrice.toLocaleString()+'원' : '—'}</td>
      <td class="${pnlRate !== null ? rCls(pnlRate) : ''}">${pnl !== null ? (pnl>=0?'+':'')+won(pnl)+'('+pnlRate+'%)' : '—'}</td>
      <td>${p.target_price ? p.target_price.toLocaleString()+'원'+(upside?` <span style="font-size:11px;">(+${upside}%)</span>`:'') : '—'}</td>
      <td>${statusBadge}</td>
    </tr>`;
  }).join('');
}

// ── 발표 히스토리
async function renderMyPresentations() {
  const { data: pres } = await sb.from('presentations')
    .select('*').eq('member_id', myMember.id)
    .order('presented_at', { ascending: false });

  document.getElementById('myPresCount').textContent = (pres||[]).length + '건';

  const tbody = document.getElementById('myPresTbody');
  if (!pres || !pres.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="muted" style="text-align:center;padding:1.5rem;">발표 내역 없음</td></tr>';
    return;
  }

  // 현재가 조회
  const codes = [...new Set((pres||[]).filter(p => p.stock_code).map(p => p.stock_code))];
  if (codes.length) {
    const { data: prices } = await sb.from('stock_prices')
      .select('stock_code,price').in('stock_code', codes);
    for (const p of (prices||[])) myPriceMap[p.stock_code] = p;
  }

  // 수익률 계산 가능 건수
  const withRet = pres.filter(p => {
    const cur = p.stock_code ? myPriceMap[p.stock_code] : null;
    return p.price_at && cur?.price;
  });
  const returns = withRet.map(p => {
    const cur = myPriceMap[p.stock_code];
    return (cur.price - p.price_at) / p.price_at * 100;
  });
  const avg = returns.length ? returns.reduce((s,r) => s+r,0) / returns.length : null;
  document.getElementById('myPresAvg').textContent = avg !== null
    ? `평균 수익률 ${avg >= 0 ? '+' : ''}${avg.toFixed(1)}% (${withRet.length}건)`
    : '수익률 데이터 없음';

  tbody.innerHTML = pres.map(p => {
    const cur     = p.stock_code ? myPriceMap[p.stock_code] : null;
    const curPrice = cur?.price;
    const ret = (p.price_at && curPrice)
      ? ((curPrice - p.price_at) / p.price_at * 100).toFixed(1) : null;
    const topicName = p.topic?.includes('>') ? p.topic.split('>')[1].trim() : p.topic;
    const catBadge  = p.category === 'industry'
      ? '<span class="badge" style="background:#e8f4fd;color:#0c447c;">산업</span>'
      : '<span class="badge b-hold">기업</span>';
    return `<tr>
      <td class="muted" style="white-space:nowrap;">${p.presented_at}</td>
      <td>${catBadge}</td>
      <td style="font-weight:500;">${topicName}</td>
      <td>${p.price_at ? p.price_at.toLocaleString()+'원' : '—'}</td>
      <td>${curPrice ? curPrice.toLocaleString()+'원' : '—'}</td>
      <td class="${ret !== null ? rCls(ret) : ''}">${ret !== null ? (ret>=0?'+':'')+ret+'%' : '—'}</td>
    </tr>`;
  }).join('');
}

// ── 결산 내역
async function renderMySettles() {
  const { data: settles } = await sb.from('settlements')
    .select('*, picks(stock_name)')
    .eq('member_id', myMember.id)
    .order('settled_at', { ascending: false });

  const tbody = document.getElementById('mySettlesTbody');
  if (!settles || !settles.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="muted" style="text-align:center;padding:1.5rem;">결산 내역 없음</td></tr>';
    return;
  }
  tbody.innerHTML = settles.map(s => {
    const d  = new Date(s.settled_at);
    const ds = `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`;
    const retRate = s.buy_price ? ((s.sell_price - s.buy_price) / s.buy_price * 100).toFixed(1) : null;
    return `<tr>
      <td class="muted">${ds}</td>
      <td style="font-weight:500;">${s.picks?.stock_name || '—'}</td>
      <td>${won(s.buy_price)}</td>
      <td>${won(s.sell_price)}</td>
      <td class="${retRate !== null ? rCls(retRate) : ''}">${retRate !== null ? (retRate>=0?'+':'')+retRate+'%' : '—'}</td>
      <td class="${rCls(s.net_profit)}">${s.net_profit>=0?'+':''}${won(s.net_profit)}</td>
    </tr>`;
  }).join('');
}

// ── 정보 수정 폼
function openEditForm() {
  const m = myMember;
  document.getElementById('edit-name').value  = m.name || '';
  document.getElementById('edit-phone').value = m.phone || '';
  document.getElementById('edit-note').value  = m.note || '';
  document.getElementById('editForm').style.display = 'block';
  document.getElementById('editForm').scrollIntoView({behavior:'smooth', block:'start'});
}
function closeEditForm() {
  document.getElementById('editForm').style.display = 'none';
  document.getElementById('edit-pw').value  = '';
  document.getElementById('edit-pw2').value = '';
  document.getElementById('pwMsg').textContent = '';
}

async function changePassword() {
  const pw  = document.getElementById('edit-pw').value;
  const pw2 = document.getElementById('edit-pw2').value;
  const msg = document.getElementById('pwMsg');

  if (!pw) { msg.style.color='#a32d2d'; msg.textContent='새 비밀번호를 입력하세요.'; return; }
  if (pw.length < 6) { msg.style.color='#a32d2d'; msg.textContent='비밀번호는 6자 이상이어야 합니다.'; return; }
  if (pw !== pw2) { msg.style.color='#a32d2d'; msg.textContent='비밀번호가 일치하지 않습니다.'; return; }

  const { error } = await sb.auth.updateUser({ password: pw });
  if (error) {
    msg.style.color = '#a32d2d';
    msg.textContent = '변경 실패: ' + error.message;
  } else {
    msg.style.color = '#0f6e56';
    msg.textContent = '✅ 비밀번호가 변경되었습니다.';
    document.getElementById('edit-pw').value  = '';
    document.getElementById('edit-pw2').value = '';
    setTimeout(() => { msg.textContent = ''; }, 3000);
  }
}

async function saveProfile() {
  const name  = document.getElementById('edit-name').value.trim();
  const phone = document.getElementById('edit-phone').value.trim();
  const note  = document.getElementById('edit-note').value.trim();
  if (!name) { toast('이름을 입력하세요.'); return; }

  const { error } = await sb.from('members').update({ name, phone, note }).eq('id', myMember.id);
  if (error) { toast('저장 오류: ' + error.message); return; }

  // 로컬 업데이트
  myMember.name  = name;
  myMember.phone = phone;
  myMember.note  = note;
  _currentMember = myMember;

  renderProfile();
  closeEditForm();
  toast('✅ 저장되었습니다.');
}

async function doLogout() { await sb.auth.signOut(); location.href = 'index.html'; }
init();
</script>
</body>
</html>
